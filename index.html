<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPA210 Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#0f0f10;
  color:#f4f1ea;
  font-family:'Cormorant Garamond', serif;
  overflow:hidden;
}

/* ===== INTRO ===== */
#intro{
  position:fixed;
  inset:0;
  background:url('spa.png') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10;
}
.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45);
  display:flex;
  align-items:center;
  justify-content:center;
}
.introText{
  text-align:center;
  font-family:'Cinzel', serif;
  font-size:32px;
  letter-spacing:4px;
}
.enterBtn{
  margin-top:36px;
  font-size:15px;
  letter-spacing:3px;
  padding:14px 28px;
  border:1px solid #f4f1ea;
  cursor:pointer;
  transition:.3s;
}
.enterBtn:hover{
  background:#f4f1ea;
  color:#111;
}

/* ===== OWL ===== */
#owl{
  position:absolute;
  top:8%;
  left:-260px;
  animation:
    fly 5.5s ease-out forwards,
    floaty 3.5s ease-in-out infinite;
}
.owlImg{ width:280px; }

@keyframes fly{
  0%{ left:-260px; }
  100%{ left:50%; transform:translateX(-50%); }
}
@keyframes floaty{
  0%{ transform: translateY(0); }
  50%{ transform: translateY(-16px); }
  100%{ transform: translateY(0); }
}

/* ===== LETTER ===== */
#letter{
  position:absolute;
  top:44%;
  left:50%;
  transform:translateX(-50%);
  opacity:0;
  cursor:pointer;
  filter: drop-shadow(0 18px 18px rgba(0,0,0,0.35));
}
.letterImg{ width:200px; }

@keyframes drop{
  0%{ transform: translate(-50%,-220px) rotate(-8deg); opacity:0; }
  60%{ transform: translate(-50%,28px) rotate(4deg); opacity:1; }
  80%{ transform: translate(-50%,-14px) rotate(-2deg); }
  100%{ transform: translate(-50%,0) rotate(0); opacity:1; }
}

/* ===== TAP HINT ===== */
#hint{
  position:absolute;
  top:72%;
  left:50%;
  transform:translateX(-50%);
  font-family:'Cinzel', serif;
  font-size:16px;
  letter-spacing:4px;
  opacity:0;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{
  0%{ opacity:.25; }
  50%{ opacity:1; }
  100%{ opacity:.25; }
}

/* ===== SCROLL REVEAL ===== */
#invite{
  display:none;
  height:100vh;
  align-items:center;
  justify-content:center;
}
.scrollWrap{
  position:relative;
  width:92vw;
  max-width:760px;
}
.scrollTop,.scrollBottom{
  position:absolute;
  left:0;
  width:100%;
  height:50%;
  background:#0f0f10;
  z-index:2;
}
.scrollTop{
  top:0;
  transform-origin:top;
  animation:openTop 1.2s ease-out forwards;
}
.scrollBottom{
  bottom:0;
  transform-origin:bottom;
  animation:openBottom 1.2s ease-out forwards;
}
@keyframes openTop{ to{ transform:scaleY(0);} }
@keyframes openBottom{ to{ transform:scaleY(0);} }

.card{
  width:100%;
  display:block;
  box-shadow:0 24px 70px rgba(0,0,0,0.6);
  border-radius:8px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="overlay">
    <div class="introText">
      SPA210<br>Private Opening
      <div class="enterBtn">Enter</div>
    </div>
  </div>
</div>

<!-- OWL -->
<div id="owl"><img src="owl.png" class="owlImg"></div>

<!-- LETTER -->
<div id="letter"><img src="letter.png" class="letterImg"></div>

<div id="hint">Tap the letter</div>

<!-- INVITE -->
<div id="invite">
  <div class="scrollWrap">
    <div class="scrollTop"></div>
    <div class="scrollBottom"></div>
    <img src="invite.png" class="card">
  </div>
</div>

<!-- ZEN SOUND (reliable method) -->
<audio id="zen" loop>
  <source src="zen.mp3" type="audio/mpeg">
</audio>

<script>
const intro = document.getElementById("intro");
const enterBtn = document.querySelector(".enterBtn");
const owl = document.getElementById("owl");
const letter = document.getElementById("letter");
const hint = document.getElementById("hint");
const invite = document.getElementById("invite");
const zen = document.getElementById("zen");

/* Play music when user clicks Enter */
enterBtn.onclick = ()=>{
  intro.style.display="none";
  zen.volume = 0;
  zen.play();
  let v=0;
  const fade=setInterval(()=>{
    if(v<0.22){ v+=0.02; zen.volume=v; }
    else clearInterval(fade);
  },200);
};

/* Letter drop */
setTimeout(()=>{
  letter.style.animation="drop 1.4s ease-out forwards";
},5800);

/* Hint appears later */
setTimeout(()=>{
  hint.style.opacity=1;
},9000);

letter.onclick = ()=>{
  owl.style.display="none";
  letter.style.display="none";
  hint.style.display="none";
  invite.style.display="flex";
};
</script>

</body>
</html>
