<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SPA210 Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#0f0f10;
  font-family:'Cormorant Garamond', serif;
}

/* ===== INTRO (STATIC — NO ZOOM) ===== */
#intro{
  position:fixed;
  inset:0;
  background:#0f0f10;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10;
}
#intro img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:contain;
}
.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45);
  display:flex;
  align-items:center;
  justify-content:center;
}
.introText{
  text-align:center;
  font-family:'Cinzel', serif;
  font-size:28px;
  letter-spacing:0.18em;
  color:#f4f1ea;
}
.enterBtn{
  margin-top:36px;
  padding:14px 28px;
  border:1px solid #f4f1ea;
  font-size:14px;
  letter-spacing:3px;
  cursor:pointer;
}

/* ===== OWL ===== */
#owl{
  position:absolute;
  top:8%;
  left:-300px;
}
.owlImg{ width:280px; }

/* ===== LETTER ===== */
#letter{
  position:absolute;
  top:40%;
  left:50%;
  transform:translateX(-50%);
  opacity:0;
  cursor:pointer;
}
.letterImg{ width:300px; }

/* ===== HINT ===== */
#hint{
  position:absolute;
  top:calc(40% + 340px);
  left:50%;
  transform:translateX(-50%);
  font-family:'Cinzel', serif;
  font-size:16px;
  letter-spacing:4px;
  color:#f4f1ea;
  opacity:0;
}

/* ===== INVITE ===== */
#invite{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
}
.card{
  width:90vw;
  max-width:760px;
  border-radius:8px;
  box-shadow:0 24px 70px rgba(0,0,0,0.6);
}

/* ===== STEAM EFFECT ===== */
.steam{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
  z-index:1;
}
.steam span{
  position:absolute;
  bottom:-120px;
  width:160px;
  height:160px;
  background:radial-gradient(circle, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0.07) 40%, transparent 70%);
  border-radius:50%;
  filter:blur(10px);
  animation:steamUp linear infinite;
  opacity:0;
}
.steam span:nth-child(1){ left:10%; animation-duration:22s; animation-delay:0s; }
.steam span:nth-child(2){ left:30%; animation-duration:26s; animation-delay:4s; }
.steam span:nth-child(3){ left:55%; animation-duration:24s; animation-delay:2s; }
.steam span:nth-child(4){ left:75%; animation-duration:28s; animation-delay:6s; }
.steam span:nth-child(5){ left:90%; animation-duration:23s; animation-delay:1s; }

@keyframes steamUp{
  0%   { transform:translateY(0) scale(0.8); opacity:0; }
  15%  { opacity:0.25; }
  50%  { opacity:0.18; }
  100% { transform:translateY(-110vh) scale(1.4); opacity:0; }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <img src="spa.png" alt="">
  <div class="overlay">
    <div class="introText">
      SPA210<br>Private Opening
      <div class="enterBtn">Enter</div>
    </div>
  </div>
</div>

<!-- STEAM -->
<div class="steam">
  <span></span><span></span><span></span><span></span><span></span>
</div>

<!-- OWL -->
<div id="owl"><img src="owl.png" class="owlImg"></div>

<!-- LETTER -->
<div id="letter"><img src="letter.png" class="letterImg"></div>

<div id="hint">Tap the letter</div>

<!-- INVITE -->
<div id="invite">
  <img src="invite.png" class="card">
</div>

<!-- MUSIC -->
<audio id="zen" loop>
  <source src="zen.mp3" type="audio/mpeg">
</audio>

<script>
const intro = document.getElementById("intro");
const enterBtn = document.querySelector(".enterBtn");
const owl = document.getElementById("owl");
const letter = document.getElementById("letter");
const hint = document.getElementById("hint");
const invite = document.getElementById("invite");
const zen = document.getElementById("zen");

enterBtn.onclick = ()=>{
  intro.style.display="none";

  // music fade-in
  zen.volume = 0;
  zen.play();
  let v=0;
  const fade=setInterval(()=>{
    if(v < 0.22){
      v += 0.02;
      zen.volume = v;
    } else {
      clearInterval(fade);
    }
  },200);

  // owl fly
  owl.animate(
    [{left:"-300px"},{left:"50%", transform:"translateX(-50%)"}],
    {duration:5500, fill:"forwards", easing:"ease-out"}
  );

  // letter drop
  setTimeout(()=>{
    letter.animate(
      [
        {transform:"translate(-50%,-220px)", opacity:0},
        {transform:"translate(-50%,20px)", opacity:1},
        {transform:"translate(-50%,0)", opacity:1}
      ],
      {duration:1400, fill:"forwards", easing:"ease-out"}
    );
  },5600);

  // hint show
  setTimeout(()=>{ hint.style.opacity=1; },8800);
};

letter.onclick = ()=>{
  owl.style.display="none";
  letter.style.display="none";
  hint.style.display="none";
  invite.style.display="flex";
};
</script>

</body>
</html>
