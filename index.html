<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SPA210 Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#0f0f10;
  font-family:'Cormorant Garamond', serif;
  color:#f4f1ea;
}

/* ===== INTRO LAYOUT ===== */
#intro{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:28px;
  z-index:10;
}

/* Title */
.introTitle{
  font-family:'Cinzel', serif;
  text-align:center;
}
.title{
  font-size:28px;
  letter-spacing:.22em;
  margin-bottom:6px;
}
.subtitle{
  font-size:13px;
  letter-spacing:.35em;
  opacity:.85;
}

/* Image */
.heroImg{
  width:88vw;
  max-width:520px;
  max-height:55vh;
  object-fit:contain;
  box-shadow:0 24px 70px rgba(0,0,0,.55);
  border-radius:10px;
}

/* Enter Button */
.enterBtn{
  padding:14px 36px;
  border-radius:999px;
  border:1.5px solid #f4f1ea;
  background:transparent;
  color:#f4f1ea;
  font-family:'Cinzel', serif;
  font-size:14px;
  letter-spacing:.25em;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 8px 24px rgba(0,0,0,.35);
}

/* ===== STEAM ===== */
.steam{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
  z-index:1;
}
.steam span{
  position:absolute;
  bottom:-120px;
  width:160px;
  height:160px;
  border-radius:50%;
  background:radial-gradient(circle,
    rgba(255,255,255,.16) 0%,
    rgba(255,255,255,.07) 40%,
    transparent 70%);
  filter:blur(10px);
  animation:steamUp linear infinite;
  opacity:0;
}
.steam span:nth-child(1){left:10%;animation-duration:22s}
.steam span:nth-child(2){left:30%;animation-duration:26s;animation-delay:4s}
.steam span:nth-child(3){left:55%;animation-duration:24s;animation-delay:2s}
.steam span:nth-child(4){left:75%;animation-duration:28s;animation-delay:6s}
.steam span:nth-child(5){left:90%;animation-duration:23s;animation-delay:1s}
@keyframes steamUp{
  0%{transform:translateY(0) scale(.8);opacity:0}
  15%{opacity:.25}
  50%{opacity:.18}
  100%{transform:translateY(-110vh) scale(1.4);opacity:0}
}

/* ===== OWL ===== */
#owl{position:absolute;top:8%;left:-300px}
.owlImg{width:280px}

/* ===== LETTER ===== */
#letter{
  position:absolute;
  top:40%;
  left:50%;
  transform:translateX(-50%);
  opacity:0;
  cursor:pointer;
}
.letterImg{width:300px}

/* ===== HINT ===== */
#hint{
  position:absolute;
  top:calc(40% + 340px);
  left:50%;
  transform:translateX(-50%);
  font-family:'Cinzel', serif;
  font-size:16px;
  letter-spacing:4px;
  color:#f4f1ea;
  opacity:0;
}

/* ===== INVITE ===== */
#invite{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
}
.scrollWrap{
  position:relative;
  width:90vw;
  max-width:760px;
}
.scrollTop,.scrollBottom{
  position:absolute;
  left:0;
  width:100%;
  height:50%;
  background:#0f0f10;
  z-index:2;
}
.scrollTop{top:0;transform-origin:top;animation:openTop 1.2s ease-out forwards}
.scrollBottom{bottom:0;transform-origin:bottom;animation:openBottom 1.2s ease-out forwards}
@keyframes openTop{to{transform:scaleY(0)}}
@keyframes openBottom{to{transform:scaleY(0)}}

.card{
  width:100%;
  border-radius:8px;
  box-shadow:0 24px 70px rgba(0,0,0,.6);
}

/* ===== GOLD SHIMMER ===== */
.cardWrap{position:relative}
.cardWrap::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,
    transparent 0%,
    rgba(255,215,120,0) 35%,
    rgba(255,215,120,.55) 50%,
    rgba(255,215,120,0) 65%,
    transparent 100%);
  transform:translateX(-120%);
}
.cardWrap.shimmer::after{
  animation:goldSweep 1.8s ease-out forwards;
}
@keyframes goldSweep{to{transform:translateX(120%)}}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="introTitle">
    <div class="title">SPA210</div>
    <div class="subtitle">PRIVATE OPENING</div>
  </div>

  <img src="spa.png" class="heroImg" alt="">

  <div class="enterBtn">ENTER</div>
</div>

<!-- STEAM -->
<div class="steam"><span></span><span></span><span></span><span></span><span></span></div>

<!-- OWL -->
<div id="owl"><img src="owl.png" class="owlImg"></div>

<!-- LETTER -->
<div id="letter"><img src="letter.png" class="letterImg"></div>
<div id="hint">Tap the letter</div>

<!-- INVITE -->
<div id="invite">
  <div class="scrollWrap">
    <div class="scrollTop"></div>
    <div class="scrollBottom"></div>
    <div class="cardWrap">
      <img src="invite.png" class="card">
    </div>
  </div>
</div>

<!-- MUSIC -->
<audio id="zen" loop>
  <source src="zen.mp3" type="audio/mpeg">
</audio>

<script>
const intro=document.getElementById("intro");
const enterBtn=document.querySelector(".enterBtn");
const owl=document.getElementById("owl");
const letter=document.getElementById("letter");
const hint=document.getElementById("hint");
const invite=document.getElementById("invite");
const zen=document.getElementById("zen");
const cardWrap=document.querySelector(".cardWrap");

enterBtn.onclick=()=>{
  intro.style.display="none";

  zen.volume=0;
  zen.play();
  let v=0;
  const fade=setInterval(()=>{
    if(v<0.22){v+=0.02;zen.volume=v;}
    else clearInterval(fade);
  },200);

  owl.animate(
    [{left:"-300px"},{left:"50%",transform:"translateX(-50%)"}],
    {duration:5500,fill:"forwards",easing:"ease-out"}
  );

  setTimeout(()=>{
    letter.animate(
      [
        {transform:"translate(-50%,-220px)",opacity:0},
        {transform:"translate(-50%,20px)",opacity:1},
        {transform:"translate(-50%,0)",opacity:1}
      ],
      {duration:1400,fill:"forwards",easing:"ease-out"}
    );
  },4600);

  setTimeout(()=>{hint.style.opacity=1},7800);
};

letter.onclick=()=>{
  owl.style.display="none";
  letter.style.display="none";
  hint.style.display="none";
  invite.style.display="flex";
  setTimeout(()=>cardWrap.classList.add("shimmer"),300);
};
</script>

</body>
</html>
